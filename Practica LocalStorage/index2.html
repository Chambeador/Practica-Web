    <button id = "boton"> Enviar</button>

    <ul id = "lista"></ul>
    <script>
        const boton1 = document.getElementById("boton");

        boton1.addEventListener("click", function(){
            const texto1 = document.getElementById("texto");
            let hora = new Date();
            let descripcion2 = texto1.value;
            let estado = document.querySelector('input[name = "requisito"]:checked').value;

            let descrip = {
                descripcion:descripcion2,

        });
